<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>시흥 특수학급 배치 및 꿈이든 현황 지도</title>

    <link rel="stylesheet" href="style.css">

    <!-- Kakao Map -->
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e35cf630c6943c39ce55fc596dcde7b&libraries=services"></script>

</head>

<body>

<a href="#map" class="skipLink">본문(지도)으로 바로가기</a>

<button
    id="toggleSidebar"
    class="toggleBtn"
    type="button"
    aria-expanded="true"
    aria-controls="sidebarPanel"
    aria-label="사이드바 숨김">

    <span class="toggleIcon" aria-hidden="true">◀</span>
    <span class="toggleText">숨<br>김</span>

</button>

<div class="container">

    <!-- ========================= -->
    <!-- 왼쪽 메뉴 -->
    <!-- ========================= -->

    <aside class="sidebar" id="sidebarPanel" role="region" aria-label="특수학급 지도 검색 및 목록">

        <div
            id="sidebarResizer"
            class="sidebarResizer"
            aria-hidden="true"
            title="드래그해서 폭 조절">
        </div>

        <div class="logo" id="logoBanner">

            <img
                src="images/siheung_logo.png"
                alt="경기도시흥교육지원청 로고"
                width="44"
                height="44"
                class="logoImg">

            <h2>시흥 특수학급 배치 및 꿈이든 현황</h2>

            <div class="logoHandle" aria-hidden="true">⋮⋮</div>

        </div>

        <!-- ========================= -->
        <!-- 번역 -->
        <!-- ========================= -->

        <div class="translateRow">

            <span class="translateLabel">[번역 / Translate / 翻译]</span>

            <div id="google_translate_element" class="translateBox"></div>

            <button
                id="btnResetTranslate"
                type="button"
                class="translateResetBtn"
                title="한국어로 되돌리기">

                🇰🇷 한국어

            </button>

        </div>

        <!-- ========================= -->
        <!-- 학교 검색 -->
        <!-- ========================= -->
        <!-- 학교 검색 + 도로명 검색 (한 블록) -->
        <!-- ========================= -->

        <section class="card">

            <h3 id="schoolSearchLabel">🔍 학교 검색</h3>

            <div class="searchBox">

                <label for="keyword" class="visuallyHidden">학교명 검색</label>

                <input
                    id="keyword"
                    type="text"
                    aria-labelledby="schoolSearchLabel"
                    placeholder="학교명을 입력하세요">

                <button id="btnSchoolSearch" type="button">

                    검색

                </button>

                <button
                    id="btnResetSchool"
                    class="resetBtn"
                    type="button"
                    title="검색 초기화"
                    aria-label="학교 검색어 및 결과 초기화">

                    ✕

                </button>

            </div>

            <ul id="searchResults" class="searchResults" hidden></ul>

            <hr class="searchDivider">

            <h3 id="addressSearchLabel">🏠 우리집 주소</h3>

            <div class="searchBox">

                <label for="address" class="visuallyHidden">우리집 주소 검색</label>

                <input
                    id="address"
                    type="text"
                    aria-labelledby="addressSearchLabel"
                    placeholder="우리집 주소를 입력하세요">

                <button id="btnAddressSearch" type="button">

                    검색

                </button>

                <button
                    id="btnResetAddress"
                    class="resetBtn"
                    type="button"
                    title="검색 초기화"
                    aria-label="우리집 주소 검색어 및 결과 초기화">

                    ✕

                </button>

            </div>

        </section>

        <!-- ========================= -->
        <!-- 현재 위치 -->
        <!-- ========================= -->

        <section class="card">

            <button
                id="btnMyLocation"
                class="locationBtn"
                type="button">

                📍 현재 위치 찾기

            </button>

           
        </section>

        <!-- ========================= -->
        <!-- TOP5 -->
        <!-- ========================= -->

        <section class="card top5Section">

            <button
                id="btnCloseTop5"
                class="top5CloseBtn"
                type="button"
                aria-label="TOP5 검색결과 닫기">

                ✕

            </button>

            <h3 id="top5Title">

                ⭐ 가까운 학교 TOP5

            </h3>

            <p id="top5Origin" class="top5Origin"></p>

            <div class="topFilter" role="group" aria-label="학교급 필터">

                <button class="active" type="button" data-type="전체" aria-pressed="true">전체</button>

                <button type="button" data-type="유치원" aria-pressed="false">유</button>

                <button type="button" data-type="초등학교" aria-pressed="false">초</button>

                <button type="button" data-type="중학교" aria-pressed="false">중</button>

                <button type="button" data-type="고등학교" aria-pressed="false">고</button>

            </div>

            <ul id="top5List" aria-live="polite" aria-atomic="false">

            </ul>

        </section>

        <!-- ========================= -->
        <!-- 학교 목록 -->
        <!-- ========================= -->

        <section class="card">

            <h3 id="schoolListLabel">

                📚 학교 목록

            </h3>

            <ul id="schoolItems" aria-labelledby="schoolListLabel">

            </ul>

        </section>

        <!-- ========================= -->
        <!-- 치료기관 현황 -->
        <!-- ========================= -->

        <section class="card supportSection therapySection">

            <div class="supportHeader">

                <label class="supportCheckLabel">

                    <input type="checkbox" id="therapyToggle">

                    <h3>🏥 치료기관 현황</h3>

                </label>

                <button
                    type="button"
                    class="collapseBtn"
                    id="therapyCollapseBtn"
                    aria-expanded="true"
                    aria-controls="therapyBody"
                    aria-label="치료기관 현황 접기/펼치기">

                    ⌄

                </button>

            </div>

            <div id="therapyBody" class="supportBody">

                <div class="searchBox">

                    <label for="therapyKeyword" class="visuallyHidden">치료기관 이름 검색</label>

                    <input
                        id="therapyKeyword"
                        type="text"
                        placeholder="기관명을 입력하세요">

                    <button id="btnTherapySearch" type="button">

                        검색

                    </button>

                    <button
                        id="btnResetTherapySearch"
                        class="resetBtn"
                        type="button"
                        title="검색 초기화"
                        aria-label="치료기관 검색어 및 결과 초기화">

                        ✕

                    </button>

                </div>

                <ul id="therapySearchResults" class="searchResults" hidden></ul>

                <div
                    id="therapyFilter"
                    class="therapyFilter"
                    role="group"
                    aria-label="치료기관 지역구 필터">

                </div>

                <ul id="therapyItems" aria-label="치료기관 목록">

                </ul>

            </div>

        </section>

        <!-- ========================= -->
        <!-- 예체능학원 현황 -->
        <!-- ========================= -->

        <section class="card supportSection artSection">

            <div class="supportHeader">

                <label class="supportCheckLabel">

                    <input type="checkbox" id="artToggle">

                    <h3>🎨 예체능학원 현황</h3>

                </label>

                <button
                    type="button"
                    class="collapseBtn"
                    id="artCollapseBtn"
                    aria-expanded="true"
                    aria-controls="artBody"
                    aria-label="예체능학원 현황 접기/펼치기">

                    ⌄

                </button>

            </div>

            <div id="artBody" class="supportBody">

                <div class="searchBox">

                    <label for="artKeyword" class="visuallyHidden">예체능학원 이름 검색</label>

                    <input
                        id="artKeyword"
                        type="text"
                        placeholder="학원명을 입력하세요">

                    <button id="btnArtSearch" type="button">

                        검색

                    </button>

                    <button
                        id="btnResetArtSearch"
                        class="resetBtn"
                        type="button"
                        title="검색 초기화"
                        aria-label="예체능학원 검색어 및 결과 초기화">

                        ✕

                    </button>

                </div>

                <ul id="artSearchResults" class="searchResults" hidden></ul>

                <div
                    id="artFilter"
                    class="therapyFilter"
                    role="group"
                    aria-label="예체능학원 지역구 필터">

                </div>

                <ul id="artItems" aria-label="예체능학원 목록">

                </ul>

            </div>

        </section>

    </aside>

    <!-- ========================= -->
    <!-- 지도 -->
    <!-- ========================= -->

    <main>

        <div id="map" role="application" aria-label="시흥시 특수학급 설치현황 지도"></div>

    </main>

</div>

<!-- 로딩창 -->

<div id="loading" role="status" aria-live="polite">

    <div class="loadingBox">

        <h2>

            🏫 학교정보 불러오는 중...

        </h2>

        <p id="loadingText">

            잠시만 기다려 주세요.

        </p>

    </div>

</div>

<script src="script.js"></script>

<!-- Google 번역 -->
<script type="text/javascript">
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        {
            pageLanguage: 'ko',
            includedLanguages: 'en,ja,zh-CN,vi,th,ru',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        },
        'google_translate_element'
    );
}
</script>
<script
    type="text/javascript"
    src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>

</body>

</html>
