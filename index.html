<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>시흥 특수학급 배치현황 지도</title>

    <link rel="stylesheet" href="style.css">

    <!-- Kakao Map -->
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1e35cf630c6943c39ce55fc596dcde7b&libraries=services"></script>

</head>

<body>

<a href="#map" class="skipLink">본문(지도)으로 바로가기</a>

<button
    id="toggleSidebar"
    class="toggleBtn"
    type="button"
    aria-expanded="true"
    aria-controls="sidebarPanel"
    aria-label="사이드바 닫기">

    <svg class="toggleChar" aria-hidden="true" viewBox="0 0 44 44" width="28" height="28">

        <!-- 몸(배냇저고리) -->
        <ellipse cx="22" cy="35" rx="14" ry="9" fill="#B2DFDB"/>

        <!-- 얼굴 -->
        <circle cx="22" cy="19" r="13" fill="#FFDAB0"/>

        <!-- 머리 위 뿅 삐친 머리카락 -->
        <path d="M18 7 Q22 1 26 7" stroke="#8D6E63" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- 볼터치 -->
        <ellipse cx="10" cy="24" rx="2.5" ry="1.8" fill="#FFB3C0" opacity="0.8"/>
        <ellipse cx="34" cy="24" rx="2.5" ry="1.8" fill="#FFB3C0" opacity="0.8"/>

        <!-- 살짝 보이는 눈(손가락 사이로 빼꼼) -->
        <circle class="peekEye" cx="16" cy="19" r="1.6" fill="#5D4037"/>
        <circle class="peekEye" cx="28" cy="19" r="1.6" fill="#5D4037"/>

        <!-- 왼손(얼굴 가림) -->
        <circle class="handLeft" cx="14" cy="20" r="8" fill="#FFDAB0" stroke="#F3C89A" stroke-width="1"/>

        <!-- 오른손(얼굴 가림) -->
        <circle class="handRight" cx="30" cy="20" r="8" fill="#FFDAB0" stroke="#F3C89A" stroke-width="1"/>

    </svg>
    <span class="toggleIcon" aria-hidden="true">◀</span>
    <span class="toggleText">숨김 </span>

</button>

<div class="container">

    <!-- ========================= -->
    <!-- 왼쪽 메뉴 -->
    <!-- ========================= -->

    <aside class="sidebar" id="sidebarPanel" role="region" aria-label="특수학급 지도 검색 및 목록">

        <div class="logo">

            <h1 aria-hidden="true">🏫</h1>

            <h2>시흥 특수학급 배치현황</h2>

        </div>

        <!-- ========================= -->
        <!-- 학교 검색 -->
        <!-- ========================= -->

        <section class="card">

            <h3 id="schoolSearchLabel">🔍 학교 검색</h3>

            <div class="searchBox">

                <label for="keyword" class="visuallyHidden">학교명 검색</label>

                <input
                    id="keyword"
                    type="text"
                    aria-labelledby="schoolSearchLabel"
                    placeholder="학교명을 입력하세요">

                <button id="btnSchoolSearch" type="button">

                    검색

                </button>

                <button
                    id="btnResetSchool"
                    class="resetBtn"
                    type="button"
                    title="검색 초기화"
                    aria-label="학교 검색어 및 결과 초기화">

                    ✕

                </button>

            </div>

            <ul id="searchResults" class="searchResults" hidden></ul>

        </section>

        <!-- ========================= -->
        <!-- 주소 검색 -->
        <!-- ========================= -->

        <section class="card">

            <h3 id="addressSearchLabel">🏠 도로명 검색</h3>

            <div class="searchBox">

                <label for="address" class="visuallyHidden">주소 검색</label>

                <input
                    id="address"
                    type="text"
                    aria-labelledby="addressSearchLabel"
                    placeholder="주소를 입력하세요">

                <button id="btnAddressSearch" type="button">

                    검색

                </button>

                <button
                    id="btnResetAddress"
                    class="resetBtn"
                    type="button"
                    title="검색 초기화"
                    aria-label="주소 검색어 및 결과 초기화">

                    ✕

                </button>

            </div>

        </section>

        <!-- ========================= -->
        <!-- 현재 위치 -->
        <!-- ========================= -->

        <section class="card">

            <button
                id="btnMyLocation"
                class="locationBtn"
                type="button">

                📍 현재 위치 찾기

            </button>

           
        </section>

        <!-- ========================= -->
        <!-- TOP5 -->
        <!-- ========================= -->

        <section class="card">

            <h3 id="top5Title">

                ⭐ 가까운 학교 TOP5

            </h3>

            <div class="topFilter" role="group" aria-label="학교급 필터">

                <button class="active" type="button" data-type="전체" aria-pressed="true">전체</button>

                <button type="button" data-type="유치원" aria-pressed="false">유</button>

                <button type="button" data-type="초등학교" aria-pressed="false">초</button>

                <button type="button" data-type="중학교" aria-pressed="false">중</button>

                <button type="button" data-type="고등학교" aria-pressed="false">고</button>

            </div>

            <ul id="top5List" aria-live="polite" aria-atomic="false">

            </ul>

        </section>

        <!-- ========================= -->
        <!-- 학교 목록 -->
        <!-- ========================= -->

        <section class="card">

            <h3 id="schoolListLabel">

                📚 학교 목록

            </h3>

            <ul id="schoolItems" aria-labelledby="schoolListLabel">

            </ul>

        </section>

    </aside>

    <!-- ========================= -->
    <!-- 지도 -->
    <!-- ========================= -->

    <main>

        <div id="map" role="application" aria-label="시흥시 특수학급 배치현황 지도"></div>

    </main>

</div>

<!-- 로딩창 -->

<div id="loading" role="status" aria-live="polite">

    <div class="loadingBox">

        <h2>

            🏫 학교정보 불러오는 중...

        </h2>

        <p id="loadingText">

            잠시만 기다려 주세요.

        </p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
